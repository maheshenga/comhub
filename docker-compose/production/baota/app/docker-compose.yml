name: ${COMPOSE_PROJECT_NAME:-comhub-app-blue}

services:
  lobe:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: ${APP_CONTAINER_NAME:-comhub-app-blue}
    env_file:
      - .env
    ports:
      - '127.0.0.1:${APP_PORT:-3210}:3210'
    environment:
      - 'APP_URL=${APP_URL}'
      - 'KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET}'
      - 'AUTH_SECRET=${AUTH_SECRET}'
      - 'DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgresql:5432/${LOBE_DB_NAME}'
      - 'INTERNAL_APP_URL=${INTERNAL_APP_URL}'
      - 'S3_ENDPOINT=${S3_ENDPOINT}'
      - 'S3_BUCKET=${RUSTFS_LOBE_BUCKET}'
      - 'S3_ENABLE_PATH_STYLE=1'
      - 'S3_ACCESS_KEY=${RUSTFS_ACCESS_KEY}'
      - 'S3_ACCESS_KEY_ID=${RUSTFS_ACCESS_KEY}'
      - 'S3_SECRET_ACCESS_KEY=${RUSTFS_SECRET_KEY}'
      - 'LLM_VISION_IMAGE_USE_BASE64=${LLM_VISION_IMAGE_USE_BASE64}'
      - 'LD_PRELOAD='
      - 'S3_SET_ACL=${S3_SET_ACL}'
      - 'SEARXNG_URL=${SEARXNG_URL}'
      - 'REDIS_URL=${REDIS_URL}'
      - 'REDIS_PREFIX=${REDIS_PREFIX}'
      - 'REDIS_TLS=${REDIS_TLS}'
      - 'QSTASH_TOKEN=${QSTASH_TOKEN}'
      - 'HTTP_PROXY=${HTTP_PROXY}'
      - 'HTTPS_PROXY=${HTTPS_PROXY}'
      - 'NO_PROXY=${NO_PROXY}'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3210/signin >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - comhub-internal

networks:
  comhub-internal:
    external: true
    name: ${COMHUB_NETWORK:-comhub-internal}
