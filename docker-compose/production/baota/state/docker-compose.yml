name: ${COMPOSE_PROJECT_NAME:-comhub-state}

services:
  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: comhub-postgres
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    environment:
      - 'POSTGRES_DB=${LOBE_DB_NAME}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    volumes:
      - '${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      comhub-internal:
        aliases:
          - postgresql

  redis:
    image: redis:7-alpine
    container_name: comhub-redis
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - '${REDIS_DATA_DIR:-./data/redis}:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      comhub-internal:
        aliases:
          - redis

  rustfs:
    image: rustfs/rustfs:latest
    container_name: comhub-rustfs
    ports:
      - '127.0.0.1:${RUSTFS_PORT:-39000}:9000'
      - '127.0.0.1:${RUSTFS_ADMIN_PORT:-39001}:9001'
    environment:
      - 'RUSTFS_CONSOLE_ENABLE=true'
      - 'RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}'
      - 'RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}'
    command:
      ['--access-key', '${RUSTFS_ACCESS_KEY}', '--secret-key', '${RUSTFS_SECRET_KEY}', '/data']
    volumes:
      - '${RUSTFS_DATA_DIR:-./data/rustfs}:/data'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    networks:
      comhub-internal:
        aliases:
          - rustfs

  rustfs-init:
    image: minio/mc:latest
    container_name: comhub-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    volumes:
      - '${BUCKET_POLICY_TEMPLATE:-../bucket.config.json}:/bucket.config.json:ro'
    entrypoint: /bin/sh
    command: >
      -c 'set -eu;
      mc alias set rustfs "http://rustfs:9000" "${RUSTFS_ACCESS_KEY}" "${RUSTFS_SECRET_KEY}";
      mc mb "rustfs/${RUSTFS_LOBE_BUCKET}" --ignore-existing;
      mc anonymous set-json "/bucket.config.json" "rustfs/${RUSTFS_LOBE_BUCKET}";'
    restart: 'no'
    networks:
      - comhub-internal

  searxng:
    image: searxng/searxng
    container_name: comhub-searxng
    volumes:
      - '${SEARXNG_SETTINGS_FILE:-../searxng-settings.yml}:/etc/searxng/settings.yml:ro'
    environment:
      - 'SEARXNG_SETTINGS_FILE=/etc/searxng/settings.yml'
    restart: unless-stopped
    networks:
      comhub-internal:
        aliases:
          - searxng

networks:
  comhub-internal:
    name: ${COMHUB_NETWORK:-comhub-internal}
    driver: bridge
