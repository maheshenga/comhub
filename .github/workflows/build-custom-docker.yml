name: Build Custom Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maheshenga/comhub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: '0'
        run: |
          set +e
          TAGS="$( echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ' )"
          TAG_ARGS=""
          for tag in $TAGS; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          echo "Building with tags: $TAG_ARGS"
          docker build $TAG_ARGS --build-arg SHA=${{ github.sha }} -f ./Dockerfile . 2>&1 | tee /tmp/docker-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::group::Docker build failed - full log"
            cat /tmp/docker-build.log
            echo "::endgroup::"
            echo "=== LAST 80 LINES ==="
            tail -80 /tmp/docker-build.log
            echo "::error::Docker build failed with exit code $BUILD_EXIT. See log above."
            exit $BUILD_EXIT
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: /tmp/docker-build.log
          retention-days: 3

      - name: Push Docker image
        run: |
          echo '${{ steps.meta.outputs.tags }}' | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "Pushing: $tag"
              docker push "$tag" 2>&1 || { echo "FAILED to push $tag"; exit 1; }
              echo "Successfully pushed: $tag"
            fi
          done
