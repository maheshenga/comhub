name: Build Custom Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maheshenga/comhub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: '0'
        run: |
          TAGS="$( echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ' )"
          TAG_ARGS=""
          for tag in $TAGS; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done
          echo "Building with tags: $TAG_ARGS"
          docker build $TAG_ARGS --build-arg SHA=${{ github.sha }} -f ./Dockerfile .

      - name: Verify built images
        run: |
          echo "=== Docker images ==="
          docker images | head -20
          echo "=== Tags from metadata ==="
          echo '${{ steps.meta.outputs.tags }}'

      - name: Push Docker image
        run: |
          echo '${{ steps.meta.outputs.tags }}' | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "Pushing: $tag"
              docker push "$tag" 2>&1 || { echo "FAILED to push $tag"; exit 1; }
              echo "Successfully pushed: $tag"
            fi
          done
